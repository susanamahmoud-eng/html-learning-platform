<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Training Platform - Gamification</title>
<style>
body { font-family: Arial; background:#eef2f7; margin:0; }
header { background:#4CAF50; color:white; padding:15px; text-align:center; }
.container { padding:20px; max-width:1000px; margin:auto; }
.section { background:white; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:#4CAF50; color:white; margin:5px; }
textarea { width:100%; height:120px; border-radius:10px; padding:10px; }
iframe { width:100%; height:150px; border:1px solid #ccc; border-radius:10px; margin-top:10px; }
.correct { color:green; }
.wrong { color:red; }
.badge { display:inline-block; background:#ffd700; padding:5px 10px; border-radius:10px; margin:5px; }
.progress-bar { width:100%; background:#ddd; border-radius:10px; overflow:hidden; }
.progress { height:20px; width:0%; background:#4CAF50; }
</style>
</head>
<body>
<header>
<h1>🎮 HTML Interactive Platform</h1>
<p>Learn - Practice - Earn Points</p>
</header>

<div class="container">

<!-- Stats -->
<div class="section">
<h2>🏆 Your Progress</h2>
<p>Points: <span id="points">0</span></p>
<div class="progress-bar"><div class="progress" id="progress"></div></div>
<div id="badges"></div>
</div>

<!-- Learning -->
<div class="section">
<h2>📘 Learn Tags</h2>
<button onclick="learn('h1')">h1</button>
<button onclick="learn('p')">p</button>
<button onclick="learn('img')">img</button>
<button onclick="learn('a')">a</button>
<div id="learnOutput"></div>
</div>

<!-- Practice -->
<div class="section">
<h2>✍️ Practice</h2>
<textarea id="codeInput" placeholder="Write your HTML code here..."></textarea>
<button onclick="runCode()">Run Code +10 Points</button>
<iframe id="result"></iframe>
</div>

<!-- Quiz -->
<div class="section">
<h2>🧠 Quiz</h2>
<p>Which tag is used to write a paragraph?</p>
<button onclick="answer(true)">&lt;p&gt;</button>
<button onclick="answer(false)">&lt;h1&gt;</button>
<button onclick="answer(false)">&lt;img&gt;</button>
<p id="quizResult"></p>
</div>

</div>

<script>
let points = 0;

function updateUI(){
 document.getElementById("points").innerText = points;
 let progress = Math.min(points,100);
 document.getElementById("progress").style.width = progress + "%";
 checkBadges();
}

function addPoints(val){
 points += val;
 updateUI();
}

function checkBadges(){
 let badges = document.getElementById("badges");
 badges.innerHTML = "";
 if(points >= 20) badges.innerHTML += '<span class="badge">⭐ Beginner</span>';
 if(points >= 50) badges.innerHTML += '<span class="badge">🔥 Intermediate</span>';
 if(points >= 100) badges.innerHTML += '<span class="badge">🏆 Pro</span>';
}

function learn(tag){
 let content = "";
 if(tag==='h1') content = "<h3>Heading</h3><h1>Hello</h1>";
 if(tag==='p') content = "<h3>Paragraph</h3><p>This is a paragraph</p>";
 if(tag==='img') content = "<h3>Image</h3><img src='https://via.placeholder.com/100'>";
 if(tag==='a') content = "<h3>Link</h3><a href='https://google.com' target='_blank'>Visit</a>";
 document.getElementById("learnOutput").innerHTML = content;
 addPoints(5);
}

function runCode(){
 let code = document.getElementById("codeInput").value;
 document.getElementById("result").srcdoc = code;
 addPoints(10);
}

function answer(correct){
 let result = document.getElementById("quizResult");
 if(correct){
 result.innerHTML = "✔ Correct Answer +15 Points";
 result.className = "correct";
 addPoints(15);
 } else {
 result.innerHTML = "❌ Try Again";
 result.className = "wrong";
 }
}
</script>

</body>
</html>
